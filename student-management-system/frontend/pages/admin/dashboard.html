<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - StudentHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
        }

        .navbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar-brand {
            color: white;
            font-size: 22px;
            font-weight: 700;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .navbar-actions {
            display: flex;
            gap: 10px;
        }

        .btn-back {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid white;
            color: white;
            padding: 8px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s;
        }

        .btn-back:hover {
            background: white;
            color: #667eea;
        }

        .btn-logout {
            background: #dc2626;
            border: none;
            color: white;
            padding: 8px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-logout:hover {
            background: #b91c1c;
        }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .page-title {
            font-size: 28px;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 30px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 28px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            text-align: center;
            border-left: 5px solid #667eea;
        }

        .stat-card .icon {
            font-size: 36px;
            margin-bottom: 12px;
        }

        .stat-card .value {
            font-size: 40px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-card .label {
            font-size: 14px;
            color: #6b7280;
            font-weight: 600;
            margin-top: 6px;
        }

        .stat-card:nth-child(2) {
            border-left-color: #16a34a;
        }

        .stat-card:nth-child(3) {
            border-left-color: #ea580c;
        }

        .stat-card:nth-child(4) {
            border-left-color: #0891b2;
        }

        .quick-links {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 16px;
        }

        .quick-link {
            background: white;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            text-decoration: none;
            color: #1f2937;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .quick-link:hover {
            transform: translateY(-4px);
            border-color: #667eea;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
            color: #1f2937;
        }

        .quick-link i {
            font-size: 28px;
            color: #667eea;
            display: block;
            margin-bottom: 8px;
        }

        .quick-link span {
            font-size: 13px;
            font-weight: 600;
        }

        .error-box {
            background: #fef2f2;
            border: 1px solid #fca5a5;
            color: #dc2626;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .loading-text {
            text-align: center;
            color: #667eea;
            padding: 40px;
            font-size: 16px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
            color: #374151;
            margin-bottom: 16px;
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <a href="../../index.html" class="navbar-brand">
            <i class="bi bi-book"></i> StudentHub
        </a>
        <div class="navbar-actions">
            <a href="../../index.html" class="btn-back">
                <i class="bi bi-arrow-left"></i> Home
            </a>
            <button class="btn-logout" onclick="handleLogout()">
                <i class="bi bi-box-arrow-right"></i> Logout
            </button>
        </div>
    </nav>

    <div class="container">
        <div class="page-title">Admin Dashboard</div>

        <div id="error-box" class="error-box"></div>
        <div id="loading" class="loading-text">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-2">Loading dashboard...</p>
        </div>

        <div id="dashboard-content" style="display:none;">
            <!-- Stats -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="icon">👨‍🎓</div>
                    <div class="value" id="student-count">0</div>
                    <div class="label">Total Students</div>
                </div>
                <div class="stat-card">
                    <div class="icon">📚</div>
                    <div class="value" id="course-count">0</div>
                    <div class="label">Active Courses</div>
                </div>
                <div class="stat-card">
                    <div class="icon">📝</div>
                    <div class="value" id="assignment-count">0</div>
                    <div class="label">Total Assignments</div>
                </div>
                <div class="stat-card">
                    <div class="icon">📊</div>
                    <div class="value" id="attendance-rate">0%</div>
                    <div class="label">Attendance Rate</div>
                </div>
            </div>

            <!-- Quick Links -->
            <div class="section-title">Manage</div>
            <div class="quick-links">
                <a href="student.html" class="quick-link"><i class="bi bi-people"></i><span>Students</span></a>
                <a href="course.html" class="quick-link"><i class="bi bi-book"></i><span>Courses</span></a>
                <a href="grade.html" class="quick-link"><i class="bi bi-star"></i><span>Grades</span></a>
                <a href="attendance.html" class="quick-link"><i
                        class="bi bi-calendar-check"></i><span>Attendance</span></a>
                <a href="assignment.html" class="quick-link"><i class="bi bi-clipboard"></i><span>Assignments</span></a>
                <a href="analytics.html" class="quick-link"><i class="bi bi-bar-chart"></i><span>Analytics</span></a>
            </div>
        </div>
    </div>

    <script src="../../scripts/main.js"></script>
    <script src="../../scripts/auth.js"></script>
    <script src="../../scripts/student.js"></script>
    <script src="../../scripts/course.js"></script>
    <script src="../../scripts/assignment.js"></script>
    <script src="../../scripts/analytics.js"></script>
    <script>
        async function loadDashboard() {
            const token = localStorage.getItem("access_token");
            if (!token) { window.location.href = "../../pages/login.html"; return; }
            if (!requireAuth("admin")) return;

            try {
                const [students, courses, assignments, attendance] = await Promise.allSettled([
                    apiFetch("/students/?skip=0&limit=1000"),
                    apiFetch("/courses/?skip=0&limit=1000&active_only=true"),
                    apiFetch("/assignments/?skip=0&limit=1000"),
                    apiFetch("/analytics/attendance-patterns")
                ]);

                const studentList = students.status === "fulfilled" ? students.value : [];
                const courseList = courses.status === "fulfilled" ? courses.value : [];
                const assignmentList = assignments.status === "fulfilled" ? assignments.value : [];
                const attendanceData = attendance.status === "fulfilled" ? attendance.value : {};

                document.getElementById("student-count").textContent =
                    Array.isArray(studentList) ? studentList.length : 0;
                document.getElementById("course-count").textContent =
                    Array.isArray(courseList) ? courseList.length : 0;
                document.getElementById("assignment-count").textContent =
                    Array.isArray(assignmentList) ? assignmentList.length : 0;

                const rate = attendanceData?.average_attendance_percentage
                    ? Math.round(attendanceData.average_attendance_percentage) : 0;
                document.getElementById("attendance-rate").textContent = rate + "%";

                document.getElementById("loading").style.display = "none";
                document.getElementById("dashboard-content").style.display = "block";

            } catch (err) {
                document.getElementById("error-box").textContent = err.message;
                document.getElementById("error-box").style.display = "block";
                document.getElementById("loading").style.display = "none";
            }
        }

        function handleLogout() { logoutUser(); }

        document.addEventListener("DOMContentLoaded", () => { loadDashboard(); });
    </script>
</body>

</html>
